repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
        verbose: true
      - id: vulture
        name: vulture (dead code)
        entry: uv run vulture
        language: system
        types: [python]
        pass_filenames: false
        verbose: true
      - id: tach
        name: tach (module boundaries)
        entry: uv run tach check
        language: system
        types: [python]
        pass_filenames: false
        verbose: true
