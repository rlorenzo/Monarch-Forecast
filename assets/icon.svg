<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Chart line trending upward -->
  <polyline
    points="100,340 180,300 240,320 300,240 360,200 420,140"
    fill="none"
    stroke="white"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Arrow tip on the line -->
  <polygon
    points="420,140 400,180 380,150"
    fill="white"
  />
  <!-- Dollar sign -->
  <text
    x="170"
    y="220"
    font-family="Arial, sans-serif"
    font-size="120"
    font-weight="bold"
    fill="white"
    opacity="0.3"
  >$</text>
</svg>
